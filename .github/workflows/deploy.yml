# ═══════════════════════════════════════════════════════════════
# file: deploy.yml
# description: GitHub Pages 自动部署工作流 · 等待 CI 通过后自动部署 main
# author: YanYuCloudCube Team
# version: v2.0.0
# created: 2026-07-16
# updated: 2026-07-16
# status: active
# tags: [deploy],[github-pages],[ci-cd],[quality-gate]
#
# brief: CI 通过后构建生产包并部署到 GitHub Pages（自定义域名 dynasty.yyc3.fun），部署后执行健康检查
#
# details:
# - pipeline: push/PR → ci.yml（质量门禁）→ deploy.yml（构建+部署）→ lighthouse.yml（性能审计）
# - 使用 pnpm + Node 22 构建生产 bundle（dist/）
# - VITE_API_URL 通过 GitHub Actions Variables 注入（在仓库 Settings → Secrets and variables → Actions 设置）
# - 部署后自动执行 5 次健康检查（含回退间隔，适配自定义域名 DNS 传播延迟）
# - public/CNAME（dynasty.yyc3.fun）随构建产物自动部署，GitHub Pages 据此启用自定义域名
# - 自定义域名 → 根路径部署，Vite base 无需改为子路径
# - 需在 GitHub 仓库 Settings → Pages → Source 选择 "GitHub Actions"
# ═══════════════════════════════════════════════════════════════

name: Deploy Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一分支新推送取消旧的部署运行，避免并发覆盖
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build production bundle
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build production bundle
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
        run: pnpm build

      - name: 📄 Configure Pages
        uses: actions/configure-pages@v6

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    name: Post-deploy smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🌐 Verify production site is reachable
        run: |
          SITE="https://dynasty.yyc3.fun/"
          echo "🔍 Testing: $SITE"
          # 最多重试 5 次，间隔 15 秒（GitHub Pages + 自定义域名 DNS 传播延迟）
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SITE" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Site OK (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Attempt $i/5 — HTTP $HTTP_CODE, waiting 15s..."
            sleep 15
          done
          echo "❌ Site unreachable after 5 attempts"
          exit 1
