# PR 路径 → 自动标签映射
# 配合 .github/workflows/auto-label.yml 使用

frontend:
  - changed-files:
    - any-glob-to-any-file: 'src/**'

agents:
  - changed-files:
    - any-glob-to-any-file: 'agents/**'

i18n:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/lib/i18n-core/**'
      - 'src/lib/i18n-react/**'
      - 'src/app/i18n*'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile'
      - 'nginx.conf'
      - '.dockerignore'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'
      - '!CHANGELOG.md'

tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/**/*.test.*'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
