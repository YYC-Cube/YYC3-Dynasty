packages:
  - '.'
# pnpm v10+ reads package manager settings here, not from package.json.
# See https://pnpm.io/settings
overrides:
  vite: 6.3.5
supportedArchitectures:
  os:
    - linux
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 3 days ago (relaxed from 7d to unblock CI).
# CI 无法绕过此策略，7 天冷静期导致 lockfile 永远滞后。
# 后续可在 CI 稳定后调回 10080 (7 days)。
minimumReleaseAge: 4320
allowBuilds:
  '@tailwindcss/oxide': true
  esbuild: true
