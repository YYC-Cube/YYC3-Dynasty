# ═══════════════════════════════════════════════════════════════
# file: nginx.conf
# description: 生产环境 nginx 配置 · SPA 静态托管 + 深链 fallback
# author: YanYuCloudCube Team
# version: v1.0.0
# created: 2026-07-12
# updated: 2026-07-12
# status: active
# tags: [config],[nginx],[deploy]
#
# brief: nginx 托管 Vite 构建的 dist/，支持 BrowserRouter 深链刷新
# ═══════════════════════════════════════════════════════════════

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── 日志 ──
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;

  # ── Gzip 压缩 ──
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/xhtml+xml
    image/svg+xml;

  server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── SPA fallback: react-router BrowserRouter 深链支持 ──
    # /edict/042 等深链刷新 200 而非 404
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── 静态资源缓存（Vite 输出带 hash，可永久缓存）──
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # index.html 不缓存（确保用户拿到最新版本入口）
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      access_log off;
    }

    # ── 安全头 ──
    # HSTS: 强制 HTTPS（生产环境 HTTPS 自动启用，preload 留待加入浏览器列表后开启）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 自定义错误页（回退到 SPA）──
    error_page 404 /index.html;
  }
}
